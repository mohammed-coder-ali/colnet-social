<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد سعيد يا جدتي ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    direction:rtl;
    color:white;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.12);
    padding:30px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    max-width:700px;
    width:90%;
}

h1{
    font-size:3rem;
}

p{
    font-size:1.3rem;
    line-height:1.8;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:1rem;
    cursor:pointer;
}

.heart{
    color:red;
    animation:beat 1s infinite;
    display:inline-block;
}

@keyframes beat{
    0%{transform:scale(1)}
    50%{transform:scale(1.3)}
    100%{transform:scale(1)}
}

.balloon{
    position:absolute;
    bottom:-100px;
    width:60px;
    height:80px;
    border-radius:50%;
    animation:float 10s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    100%{transform:translateY(-120vh)}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 عيد ميلاد سعيد يا جدتي <span class="heart">❤️</span></h1>

    <p>
        جدتي الحبيبة،<br><br>
        كل عام وأنتِ بخير وصحة وسلامة ❤️<br>
        شكراً لكِ على الحب والحنان والذكريات الجميلة.<br>
        أنتِ نور بيتنا وسعادتنا دائمًا.<br><br>
        نحبك كثيرًا ونتمنا لكِ حياة مليئة بالفرح 🌸
    </p>

    <button onclick="alert('عيد ميلاد سعيد يا جدتي ❤️🎂')">
        اضغط للمفاجأة 🎁
    </button>

    <p style="margin-top:15px;font-size:0.9rem;">
        🎵 يمكنك إضافة أغنية عيد ميلاد عربية هنا
    </p>

    <audio controls autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
// balloons
for(let i=0;i<15;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.background=["#ff4d6d","#ffd166","#06d6a0","#4cc9f0"][Math.floor(Math.random()*4)];
    b.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(b);
}
</script>

</body>
</html>
